# local.d/groups.conf — tiered scoring for the strixd YARA backend.
#
# The plugin classifies every matched rule into ONE scoring tier symbol (by its
# name / source-file / tags / meta.score) instead of one flat weight for any
# match, so a high-confidence malware-family hit scores more than a broad
# heuristic. Each symbol carries the matched rule names as options
# ("rule (source-file.yar)"); the tiers stack, capped by max_score.
#
# Within a tier the symbol weight is no longer a flat 1.0: the plugin modulates
# it by the rule's meta.score (0..100, as shipped by YARA-Forge/signature-base)
# onto a [0.5, 1.5] band (plugin `score_weight_min`/`_max`), so the effective
# contribution is group_weight * symbol_weight — a high-confidence rule pushes
# above the tier's nominal weight, a borderline one below it. Rules without a
# meta.score stay at 1.0. Size the weights below for the 1.0 (no-score) case.
#
# Tune per your traffic. For a cautious first deploy set the weights you are
# unsure about to 0.0 (log-only): the symbol still shows in the history so you
# can watch what each tier catches before it bites. STRIX_SUSPICIOUS is the most
# FP-prone (broad heuristics), so it is deliberately low.
group "STRIX" {
  description = "YARA rule matches via the strixd backend (tiered)";
  max_score = 15;            # ceiling on this group's combined contribution

  symbols {
    "STRIX_MALWARE" {
      # Malware family / webshell / RAT / APT / ransomware / loader / stealer.
      # High-confidence "this is a known bad thing", strongest YARA tier.
      weight = 8.0;
      description = "attachment/message matched a malware-family YARA rule";
    }
    "STRIX_EXPLOIT" {
      # Exploit / CVE / maldoc exploit (e.g. Equation Editor CVE-2017-11882).
      weight = 7.0;
      description = "matched an exploit/CVE YARA rule";
    }
    "STRIX_PHISHING" {
      # Phishing kit / phishing document.
      weight = 5.0;
      description = "matched a phishing YARA rule";
    }
    "STRIX" {
      # Default bucket: a rule that did not classify into a tier above. Still a
      # curated public malware rule, so it scores, but below the named tiers.
      weight = 4.0;
      description = "matched an (uncategorized) YARA rule";
    }
    "STRIX_SUSPICIOUS" {
      # Heuristic / suspicious / anomaly / obfuscation — broad, more FP-prone, so
      # low weight: a nudge that stacks, not a verdict on its own.
      weight = 2.0;
      description = "matched a heuristic/suspicious YARA rule";
    }
    "URLHAUS_MALWARE_URL" {
      # A URL in the message/macro matched abuse.ch URLhaus (known malware
      # distribution). Exact-URL hits are high-confidence; the matched URLs ride
      # as options (with (host)/(deobf) tags). High, still below reject-alone.
      weight = 8.0;
      description = "message or macro contained a known malware URL (URLhaus)";
    }
    "MALWAREBAZAAR_MALWARE" {
      # The attachment's SHA256 matched a known malware sample on abuse.ch
      # MalwareBazaar — an exact file-level hit, the strongest single signal
      # here. The matched SHA256 rides as the option. Highest weight; tune toward
      # reject if you trust the feed.
      weight = 10.0;
      description = "attachment is a known malware sample (MalwareBazaar)";
    }
    "THREATFOX_IOC" {
      # A URL/domain in the message or macro matched abuse.ch ThreatFox (curated
      # IOC feed from live ThreatFox/MalwareBazaar hunting). The matched URL rides
      # as the option (with (domain)/(deobf) tags). High-confidence feed hit, sized
      # just below URLhaus (broader IOC scope → marginally more FP surface).
      weight = 7.0;
      description = "message or macro contained a known malicious URL/domain (ThreatFox)";
    }
    "STRIX_ALLOWLISTED" {
      # Rules strixd allowlisted (MAILSTRIX_RULE_ALLOWLIST): a known-FP rule kept
      # visible in the history but force-demoted to log-only. Weight 0 — it never
      # contributes to the score; raise it briefly only if you want to re-observe
      # a demoted rule's hit rate before removing it from the allowlist.
      weight = 0.0;
      description = "matched a YARA rule allowlisted to log-only";
    }
  }
}
