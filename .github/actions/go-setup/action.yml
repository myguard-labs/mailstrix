name: Go + libyara setup
description: >
  Set up Go 1.25 (with go.sum module cache) and install libyara-dev — the CGO
  dependency every build-based job needs. Optional extra apt packages via the
  `packages` input (e.g. clang for the ASan job). Factored out so lint/asan/
  codeql/fuzz share one definition instead of repeating setup-go + apt.

inputs:
  packages:
    description: Extra apt packages to install alongside libyara-dev.
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        # Pin the exact patch, not the "1.25" line: a self-hosted runner caches
        # the toolchain and "1.25" matches a stale cached 1.25.11 without fetching
        # newer patches, so govulncheck flags stdlib CVEs already fixed in 1.25.12
        # (e.g. GO-2026-5856). Bump this on each stdlib-security patch.
        go-version: "1.25.12"
        cache-dependency-path: go.sum
    - name: install libyara (CGO dep) ${{ inputs.packages }}
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libyara-dev ${{ inputs.packages }}
