# strixd CI — the per-PR/push gate. Authoritative job is `docker` (self-contained
# libyara); `lint` + `scanners` run alongside. Deep/slow, low-per-PR-yield checks
# (asan, codeql, fuzz) run MONTHLY in maintenance.yml, NOT on every PR. Exposed
# via workflow_call so release.yml runs this same gate before publishing. Build
# with go 1.25 — the 1.24 branch no longer gets the stdlib security fixes
# govulncheck enforces.
name: ci
on:
  # CI runs on PRs into main/master ONLY — not on push to main. A merge already
  # passed this gate on the PR, so re-running it on the resulting push to main is
  # wasted compute. release.yml still invokes this same gate via workflow_call
  # before publishing.
  pull_request:
    # Per-item campaign PRs target the staging branch `dev` and are gated by the
    # local CI gate only (tools/strixd-local-ci.sh); remote CI runs once on the
    # aggregate dev->main PR. Filtering on the base branch keeps PRs into dev from
    # firing this workflow while still running it for PRs into main/master.
    branches: [main, master]
  workflow_call:

# Cancel a superseded in-progress run when new commits land on the same PR/ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Authoritative gate: build + test exactly as the production image does (CGO
  # against the statically-built libyara). The Dockerfile `test` target runs
  # `go vet` + `go test -race -tags yara_static`; then we build the final image,
  # run it against a local EICAR rule, and smoke the HTTP contract.
  docker:
    runs-on: [self-hosted, builder02, docker]
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write   # buildx GHA layer cache (--cache-to/from type=gha)
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: build test stage (go vet + go test -race in-image)
        run: |
          docker buildx build --target test -f docker/Dockerfile -t strixd-test \
            --load \
            --cache-from type=gha,scope=strixd-build \
            --cache-to type=gha,mode=max,scope=strixd-build \
            .

      - name: build final image
        run: |
          docker buildx build --target final -f docker/Dockerfile -t strixd:ci \
            --load \
            --cache-from type=gha,scope=strixd-build \
            --cache-to type=gha,mode=max,scope=strixd-build \
            --build-arg LOCAL_ONLY=1 \
            --build-arg CACHEBUST=rules-${{ hashFiles('docker/local-rules/**','docker/fetch-rules.sh','docker/compile-rules.sh','docker/Dockerfile') }} \
            .

      - name: trivy image scan (HIGH,CRITICAL)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.62.1 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --timeout 5m \
            strixd:ci

      - name: smoke matrix (HTTP contract + every rule/extractor channel)
        run: scripts/smoke.sh strixd:ci

  lint:
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]
      - uses: ./.github/actions/go-setup
      # Cache the compiled analysis-tool binaries in ~/go/bin so they aren't
      # recompiled from source every run (was the ~7-8 min lint bottleneck —
      # go-setup already caches modules + build, not these tool binaries). Bump
      # the `-rev` suffix to force a refresh to newer @latest tool versions.
      - name: cache go analysis tools
        id: gotools
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: gotools-${{ runner.os }}-go1.25-rev1
      - name: install analysis tools (on cache miss)
        if: steps.gotools.outputs.cache-hit != 'true'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: staticcheck
        run: staticcheck ./...
      - name: govulncheck
        # binary cached; the vuln DB is fetched fresh at runtime regardless.
        run: govulncheck ./...
      - name: gosec
        run: gosec ./...

  # Non-Go static analysis (workflows, shell, Dockerfile, dependency CVEs). Run
  # via pinned upstream images instead of marketplace actions to avoid pulling
  # extra third-party Actions into the supply chain.
  scanners:
    runs-on: [self-hosted, builder02, docker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]
      # Images pinned to explicit versions (not :latest/:stable) for reproducible,
      # drift-free scans. Bump deliberately.
      - name: actionlint (workflow syntax + embedded shell)
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 -color
      - name: shellcheck (rule + packaging maintainer scripts)
        run: docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:v0.10.0 scripts/smoke.sh contrib/spamassassin/t/sa-lint.sh docker/fetch-rules.sh docker/compile-rules.sh docker/generate-rules.sh docker/pprof-capture.sh docker/profile/run-profile.sh packaging/deb/preremove.sh packaging/deb/postinstall.sh packaging/deb/maintscript_test.sh packaging/deb/env_keys_test.sh packaging/deb/readme_install_test.sh packaging/deb/contrib_links_test.sh packaging/deb/workflow_pins_test.sh packaging/deb/rule_source_args_test.sh packaging/deb/filter_rules_test.sh packaging/deb/smoke_shared_test.sh

      - name: deb maintainer-script behaviour (upgrade must not disable)
        run: sh packaging/deb/maintscript_test.sh

      - name: SHA-pinned actions consistent across workflows
        run: sh packaging/deb/workflow_pins_test.sh

      - name: documented rule-source build-args reach the build
        run: sh packaging/deb/rule_source_args_test.sh

      - name: mail-profile rule filter stays conservative
        run: sh packaging/deb/filter_rules_test.sh

      - name: deb env sample keys match the code
        run: sh packaging/deb/env_keys_test.sh

      - name: README install has no stale pinned versions
        run: sh packaging/deb/readme_install_test.sh

      - name: contrib README relative links resolve
        run: sh packaging/deb/contrib_links_test.sh

      - name: smoke matrix is a shared script invoked by ci.yml
        run: sh packaging/deb/smoke_shared_test.sh
      - name: hadolint (Dockerfile; .hadolint.yaml ignores)
        run: docker run --rm -v "$PWD:/repo" -w /repo hadolint/hadolint:v2.12.0 hadolint docker/Dockerfile docker/Dockerfile.release
      - name: osv-scanner (go.mod/go.sum dependency CVEs)
        run: docker run --rm -v "$PWD:/src" -w /src ghcr.io/google/osv-scanner:v1.9.2 --lockfile=go.mod

      - name: zizmor (Actions supply-chain hardening)
        run: docker run --rm -v "$PWD:/repo" -w /repo ghcr.io/woodruffw/zizmor:1.6.0 --format plain .github/workflows/

      - name: luacheck (Lua lint for rspamd plugin)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            apk add --no-cache luarocks5.4 lua5.4-dev gcc musl-dev >/dev/null 2>&1
            luarocks-5.4 install luacheck >/dev/null 2>&1
            luacheck contrib/rspamd/
          '

      - name: lua plugin unit tests (dedup + effort + explainability contracts)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            apk add --no-cache lua5.4 >/dev/null 2>&1
            lua5.4 contrib/rspamd/test/mailstrix_dedup_spec.lua
            lua5.4 contrib/rspamd/test/mailstrix_effort_spec.lua
            lua5.4 contrib/rspamd/test/mailstrix_explain_spec.lua
            lua5.4 contrib/rspamd/test/mailstrix_feed_routing_spec.lua
          '

      - name: spamassassin plugin (perl -c + http/shellout unit tests)
        run: |
          docker run --rm -v "$PWD:/src" -w /src debian:trixie-slim sh -c '
            apt-get update >/dev/null 2>&1
            apt-get install -y --no-install-recommends spamassassin libhttp-tiny-perl perl >/dev/null 2>&1
            # Syntax-check the plugin against the installed Mail::SpamAssassin.
            perl -I contrib/spamassassin -c contrib/spamassassin/Mailstrix.pm
            # Hermetic unit tests: http mode via a mocked HTTP::Tiny, shellout mode
            # via fake strix-scan scripts. No running strixd needed.
            prove -v -I contrib/spamassassin contrib/spamassassin/t/mailstrix.t
          '

      - name: spamassassin --lint (real plugin + .pre/.cf load against installed SA)
        run: |
          # perl -c above only syntax-checks Mailstrix.pm; it does NOT exercise the
          # real plugin registration, the loadplugin in strixd.pre, or the rule
          # syntax / meta deps in strixd.cf. --lint loads all three against the
          # installed Mail::SpamAssassin and fails on any plugin-load, eval-rule,
          # or config error. Closes the long-standing "real-host lint" gap.
          docker run --rm -v "$PWD:/src" -w /src debian:trixie-slim sh -c '
            apt-get update >/dev/null 2>&1
            apt-get install -y --no-install-recommends spamassassin libhttp-tiny-perl perl >/dev/null 2>&1
            d=/etc/spamassassin
            install -m644 contrib/spamassassin/Mailstrix.pm "$d/Mailstrix.pm"
            install -m644 contrib/spamassassin/strixd.pre "$d/strixd.pre"
            install -m644 contrib/spamassassin/strixd.cf  "$d/strixd.cf"
            spamassassin --lint
          '

  # NOTE: asan, codeql, fuzz, semgrep, arm64-race are DEEP, slow, or
  # low-per-PR-yield checks — they run MONTHLY (+ on demand) in maintenance.yml,
  # NOT on every PR. The per-PR
  # gate (docker + lint + scanners) stays fast; release.yml reuses THIS workflow
  # (workflow_call) so a tagged release re-runs docker+lint+scanners before
  # publishing. asan/codeql/fuzz run on the monthly cadence, not per release.
