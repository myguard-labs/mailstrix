# yarad CI. The `docker` job is the authoritative gate (self-contained libyara);
# lint/fuzz/codeql use apt libyara-dev on the runner. Build with go 1.25 — the
# 1.24 branch no longer gets stdlib security fixes that govulncheck enforces.
name: ci
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  # Authoritative gate: build + test exactly as the production image does (CGO
  # against the statically-built libyara). The Dockerfile `test` target runs
  # `go vet` + `go test -race -tags yara_static`; then we build the final image,
  # run it against a local EICAR rule, and smoke the HTTP contract.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: build test stage (go vet + go test -race in-image)
        run: docker build --target test -f docker/Dockerfile -t yarad-test .

      - name: build final image
        run: docker build --target final -f docker/Dockerfile -t yarad:ci --build-arg CACHEBUST=ci-${{ github.sha }} .

      - name: smoke (EICAR rule, scan/clean/auth/health/metrics)
        run: |
          set -euo pipefail
          mkdir -p rules
          cat > rules/eicar.yar <<'YAR'
          rule EICAR_Test_File : test {
            strings: $e = "$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!"
            condition: $e
          }
          YAR
          docker run -d --name yc -e YARAD_TOKEN=ci -e YARAD_RULES= -e YARAD_RULES_DIR=/r \
            -v "$PWD/rules:/r:ro" -p 18079:8079 yarad:ci
          for _ in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' yc)" = healthy ] && break; sleep 1
          done
          [ "$(docker inspect -f '{{.State.Health.Status}}' yc)" = healthy ] || { docker logs yc; exit 1; }

          # build the EICAR body at runtime (don't ship the literal signature)
          # shellcheck disable=SC2016  # the $-segments are the literal EICAR token, must NOT expand
          EICAR='X5O!P%@AP[4\PZX54(P^)7CC)7}'"\$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!"'$H+H*'

          match=$(printf '%s' "$EICAR" | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18079/scan)
          echo "match: $match"; echo "$match" | grep -q EICAR_Test_File

          clean=$(printf 'plain body' | curl -s -H "X-YARAD-Token: ci" --data-binary @- http://127.0.0.1:18079/scan)
          echo "clean: $clean"; [ "$clean" = '{"matches":[]}' ]

          code=$(printf x | curl -s -o /dev/null -w '%{http_code}' -H "X-YARAD-Token: wrong" --data-binary @- http://127.0.0.1:18079/scan)
          [ "$code" = 401 ]

          curl -s http://127.0.0.1:18079/metrics | grep -q 'yarad_rules 1'
          curl -s http://127.0.0.1:18079/ready | grep -q ready
          curl -s http://127.0.0.1:18079/version | grep -q extractor_version
          docker rm -f yc

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: install libyara (CGO dep for build-based linters)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libyara-dev
      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then echo "gofmt needed on:"; echo "$unformatted"; exit 1; fi
      - name: vet
        run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  # Non-Go static analysis (workflows, shell, Dockerfile, dependency CVEs). Run
  # via pinned upstream images instead of marketplace actions to avoid pulling
  # extra third-party Actions into the supply chain.
  scanners:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: actionlint (workflow syntax + embedded shell)
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest -color
      - name: shellcheck (rule fetch/compile scripts)
        run: docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:stable docker/fetch-rules.sh docker/compile-rules.sh
      - name: hadolint (Dockerfile; .hadolint.yaml ignores)
        run: docker run --rm -v "$PWD:/repo" -w /repo hadolint/hadolint hadolint docker/Dockerfile
      - name: osv-scanner (go.mod/go.sum dependency CVEs)
        run: docker run --rm -v "$PWD:/src" -w /src ghcr.io/google/osv-scanner:latest --lockfile=go.mod

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: install libyara
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libyara-dev
      - name: fuzz smoke (untrusted /scan body)
        run: go test -run=x -fuzz='^FuzzScanBody$' -fuzztime=30s ./internal/yarad/
      - name: fuzz smoke (extract — hostile OLE2/OOXML attachment)
        run: go test -run=x -fuzz='^FuzzExtract$' -fuzztime=60s ./internal/extract/

  # AddressSanitizer over the CGO/libyara surface: catches heap errors in our
  # go-yara usage (Scanner lifecycle, buffer passing) that -race can't. Valgrind
  # is deliberately NOT used — on a Go binary its runtime/GC trips constant false
  # positives; ASAN via the Go toolchain is the right tool for the cgo boundary.
  # The pure-Go extract package is also exercised (harmless, no cgo there).
  asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: install libyara + clang
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libyara-dev clang
      - name: go test -asan
        env:
          CC: clang
          # libyara is not ASAN-built (dynamic apt package), so suppress the
          # cross-DSO false positives while keeping real heap-error detection.
          ASAN_OPTIONS: detect_leaks=0:detect_odr_violation=0
        run: go test -asan ./...

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum
      - name: install libyara
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libyara-dev
      - run: go build ./...
      - uses: github/codeql-action/analyze@v3
