# Fuzzing — runs monthly (and on demand), NOT on every PR. The per-PR fuzz
# smoke found nothing after the initial pass and slowed the gate, so it lives
# here with a longer fuzztime instead. Manual run: Actions -> fuzz -> Run.
name: fuzz
on:
  schedule:
    - cron: "0 4 1 * *" # 04:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/go-setup
      - name: fuzz (untrusted /scan body)
        run: go test -run=x -fuzz='^FuzzScanBody$' -fuzztime=5m ./internal/yarad/
      - name: fuzz (extract — hostile OLE2/OOXML attachment)
        run: go test -run=x -fuzz='^FuzzExtract$' -fuzztime=10m ./internal/extract/
