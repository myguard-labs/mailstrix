# Monthly maintenance — the DEEP/slow checks pulled off the per-PR gate so PRs
# stay fast: fuzzing, AddressSanitizer over the cgo/libyara surface, and CodeQL
# semantic analysis. Low per-PR yield (fuzz found nothing per-PR after the first
# pass; asan/codeql rarely flag once green), high value run periodically. Manual
# run: Actions -> maintenance -> Run workflow.
name: maintenance
on:
  schedule:
    - cron: "0 4 1 * *" # 04:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]
      - uses: ./.github/actions/go-setup
      - name: fuzz (untrusted /scan body)
        run: go test -run=x -fuzz='^FuzzScanBody$' -fuzztime=5m ./internal/mailstrix/
      - name: fuzz (ICAP chunk-size header line)
        run: go test -run=x -fuzz='^FuzzReadICAPChunkHeaderLine$' -fuzztime=5m ./internal/mailstrix/
      - name: fuzz (ICAP chunked body — hostile proxy stream)
        run: go test -run=x -fuzz='^FuzzReadICAPChunkedBody$' -fuzztime=5m ./internal/mailstrix/
      - name: fuzz (mbazaar feed — zip/CSV decompress)
        run: go test -run=x -fuzz='^FuzzParseFeed$' -fuzztime=5m ./internal/mbazaar/
      - name: fuzz (mbazaar — zip/plain CSV dispatch)
        run: go test -run=x -fuzz='^FuzzOpenCSV$' -fuzztime=5m ./internal/mbazaar/
      - name: fuzz (extract — hostile OLE2/OOXML attachment)
        run: go test -run=x -fuzz='^FuzzExtract$' -fuzztime=10m ./internal/extract/
      - name: fuzz (extract — BIFF8 SHRFMLA shared-formula record)
        run: go test -run=x -fuzz='^FuzzSHRFMLARecord$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — BIFF8 XLM ptg formula token stream)
        run: go test -run=x -fuzz='^FuzzParseBIFF8Formula$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — BIFF12 .xlsb XLM ptg formula token stream)
        run: go test -run=x -fuzz='^FuzzParseBIFF12Formula$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — bounded XLM emulator)
        run: go test -run=x -fuzz='^FuzzEmulateXLM$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — MS-OVBA DecompressStream token bomb)
        run: go test -run=x -fuzz='^FuzzDecompressStream$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — XLM formula constant-fold)
        run: go test -run=x -fuzz='^FuzzFoldXLMFormula$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — multi-layer static decode)
        run: go test -run=x -fuzz='^FuzzFromEncoded$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — PDF object/stream carver)
        run: go test -run=x -fuzz='^FuzzPDF$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — RTF objdata hex-decode)
        run: go test -run=x -fuzz='^FuzzRTF$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — LNK ShellLink section walk)
        run: go test -run=x -fuzz='^FuzzLNK$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — TNEF winmail.dat TLV decode)
        run: go test -run=x -fuzz='^FuzzTNEF$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — OneNote FileDataStoreObject carve)
        run: go test -run=x -fuzz='^FuzzOneNote$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — SYLK formula fold)
        run: go test -run=x -fuzz='^FuzzSLK$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — MS Script Encoder decode)
        run: go test -run=x -fuzz='^FuzzEncodedScript$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — CSV/TSV DDE injection)
        run: go test -run=x -fuzz='^FuzzCSVDDE$' -fuzztime=5m ./internal/extract/
      - name: "fuzz (extract — HTML/SVG smuggling + data: URI)"
        run: go test -run=x -fuzz='^FuzzHTMLSmuggling$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — batch echo-redirect dropper)
        run: go test -run=x -fuzz='^FuzzBatchDropper$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — password-protected archive decrypt)
        run: go test -run=x -fuzz='^FuzzDecryptArchive$' -fuzztime=5m ./internal/extract/

  # AddressSanitizer over the CGO/libyara surface: catches heap errors in our
  # go-yara usage (Scanner lifecycle, buffer passing) that -race can't. Valgrind
  # is deliberately NOT used — on a Go binary its runtime/GC trips constant false
  # positives; ASAN via the Go toolchain is the right tool for the cgo boundary.
  asan:
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]
      - uses: ./.github/actions/go-setup
        with:
          packages: clang
      - name: go test -asan
        env:
          CC: clang
          # libyara is not ASAN-built (dynamic apt package), so suppress the
          # cross-DSO false positives while keeping real heap-error detection.
          ASAN_OPTIONS: detect_leaks=0:detect_odr_violation=0
        run: go test -asan ./...

  codeql:
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          languages: go
      - uses: ./.github/actions/go-setup
      - run: go build ./...
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3

  # NOTE: a `rule-bundle-audit` job used to live here — it built the full
  # rules-export stage (fetch + compile all 8 public feeds) monthly to audit the
  # bundle. Removed 2026-06-28: compiling the public ruleset on GitHub is too
  # heavy. The bundle is now built ONLY by the local nightly cron
  # (docker/generate-rules.sh on the build host), which fetches + compiles +
  # publishes to the `rules-current` release. GitHub image builds use
  # LOCAL_ONLY=1 (local-rules only). Audit the bundle from the cron log /
  # rules-current manifest instead.

  perf-regression:
    runs-on: [self-hosted, builder02, docker]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: build test image
        run: |
          docker buildx build --target test             --load -t strixd-test             -f docker/Dockerfile .

      - name: run benchmarks
        run: |
          # NOTE: package is ./internal/mailstrix (renamed from ./internal/strixd).
          docker run --rm strixd-test             go test -bench=. -benchmem -count=6 -timeout=10m             ./internal/mailstrix/ ./internal/extract/             | tee bench-results.txt

      - name: regression gate (vs committed baseline)
        run: |
          set -euo pipefail
          BASE=docker/perf-baseline.txt
          # Generous threshold: GitHub runners are noisy, so this gate catches
          # algorithmic blow-ups (O(n)->O(n^2), lost fast-path), NOT micro-noise.
          THRESH="${PERF_REGRESSION_PCT:-50}"
          if [ ! -f "$BASE" ]; then
            echo "::warning::no $BASE committed yet — seed it from the benchmark-results artifact of this run; gate is informational until then"
            exit 0
          fi
          # Compare ns/op per benchmark name; fail if any is >THRESH% slower.
          awk -v thresh="$THRESH" '
            FNR==NR { if ($1 ~ /^Benchmark/) base[$1]=$3; next }
            $1 ~ /^Benchmark/ && ($1 in base) && base[$1]+0>0 {
              d=($3-base[$1])/base[$1]*100
              printf "%-50s base=%s now=%s  %+.1f%%\n",$1,base[$1],$3,d
              if (d>thresh) { print "REGRESSION >"thresh"%: "$1 > "/dev/stderr"; bad=1 }
            }
            END { exit bad }
          ' "$BASE" bench-results.txt

      - name: upload benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: benchmark-results
          path: bench-results.txt
          retention-days: 90

  # arm64 race detector: the per-PR docker `test` stage runs `go test -race` on
  # amd64 only; arm64 binaries SHIP (release.yml) but were never race/test-run, so
  # a CGO/arm64-specific bug (libyara alignment, cgo pointer rules) could land
  # untested. Runs natively on an arm64 runner — no QEMU. Audit 2026-06-30.
  race-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: build test image (arm64 native)
        run: docker buildx build --target test --load -t strixd-test-arm64 -f docker/Dockerfile .
      - name: go vet + go test -race (arm64)
        run: docker run --rm strixd-test-arm64 go test -race ./...

  # semgrep moved here from the per-PR gate (ci.yml): it ran continue-on-error so
  # it never gated, advertising a check it didn't enforce. Run it monthly until the
  # ruleset is curated; --error makes it fail the monthly job so findings surface.
  # Audit 2026-06-30.
  semgrep:
    runs-on: [self-hosted, builder02, docker]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]
      - name: semgrep scan
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep:1.119.0 \
            semgrep scan --config auto \
            --exclude 'vendor' --exclude 'testdata' \
            --error
