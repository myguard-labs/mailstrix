# Monthly maintenance — the DEEP/slow checks pulled off the per-PR gate so PRs
# stay fast: fuzzing, AddressSanitizer over the cgo/libyara surface, and CodeQL
# semantic analysis. Low per-PR yield (fuzz found nothing per-PR after the first
# pass; asan/codeql rarely flag once green), high value run periodically. Manual
# run: Actions -> maintenance -> Run workflow.
name: maintenance
on:
  schedule:
    - cron: "0 4 1 * *" # 04:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]
      - uses: ./.github/actions/go-setup
      - name: fuzz (untrusted /scan body)
        run: go test -run=x -fuzz='^FuzzScanBody$' -fuzztime=5m ./internal/yarad/
      - name: fuzz (extract — hostile OLE2/OOXML attachment)
        run: go test -run=x -fuzz='^FuzzExtract$' -fuzztime=10m ./internal/extract/
      - name: fuzz (extract — BIFF8 XLM ptg formula token stream)
        run: go test -run=x -fuzz='^FuzzParseBIFF8Formula$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — BIFF12 .xlsb XLM ptg formula token stream)
        run: go test -run=x -fuzz='^FuzzParseBIFF12Formula$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — bounded XLM emulator)
        run: go test -run=x -fuzz='^FuzzEmulateXLM$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — MS-OVBA DecompressStream token bomb)
        run: go test -run=x -fuzz='^FuzzDecompressStream$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — XLM formula constant-fold)
        run: go test -run=x -fuzz='^FuzzFoldXLMFormula$' -fuzztime=5m ./internal/extract/
      - name: fuzz (extract — multi-layer static decode)
        run: go test -run=x -fuzz='^FuzzFromEncoded$' -fuzztime=5m ./internal/extract/

  # AddressSanitizer over the CGO/libyara surface: catches heap errors in our
  # go-yara usage (Scanner lifecycle, buffer passing) that -race can't. Valgrind
  # is deliberately NOT used — on a Go binary its runtime/GC trips constant false
  # positives; ASAN via the Go toolchain is the right tool for the cgo boundary.
  asan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]
      - uses: ./.github/actions/go-setup
        with:
          packages: clang
      - name: go test -asan
        env:
          CC: clang
          # libyara is not ASAN-built (dynamic apt package), so suppress the
          # cross-DSO false positives while keeping real heap-error detection.
          ASAN_OPTIONS: detect_leaks=0:detect_odr_violation=0
        run: go test -asan ./...

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: ./.github/actions/go-setup
      - run: go build ./...
      - uses: github/codeql-action/analyze@v3

  rule-bundle-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]

      - uses: docker/setup-buildx-action@8d2750c64d4f89012b439cd2de0e09c3ed2f4e32

      - name: build rules + capture output
        run: |
          set -euo pipefail
          # Build the rules-export stage with progress=plain to capture yarac output.
          docker buildx build --target rules-export \
            --build-arg "CACHEBUST=$(date +%s)" \
            --output "type=local,dest=rules-out" \
            --progress=plain \
            -f docker/Dockerfile . 2>&1 | tee rules-build.log

      - name: audit bundle contents
        run: |
          set -euo pipefail
          echo "=== Rule sources ==="
          if [ -f rules-out/sources.json ]; then
            python3 -m json.tool rules-out/sources.json
          else
            echo "::warning::sources.json missing from rules export"
          fi

          echo ""
          echo "=== Bundle stats ==="
          size=$(stat -c '%s' rules-out/compiled.yac)
          echo "compiled.yac: $(numfmt --to=iec "$size")"
          sha256sum rules-out/compiled.yac
          echo "libyara: $(cat rules-out/libyara.version)"

          echo ""
          echo "=== Compile warnings ==="
          warnings=$(grep -iE 'slow|warning|skip' rules-build.log | grep -v '^#' || true)
          if [ -n "$warnings" ]; then
            echo "$warnings"
            count=$(echo "$warnings" | wc -l)
            echo "::warning::$count compile warnings found (see output)"
          else
            echo "No compile warnings"
          fi

          echo ""
          echo "=== Fetch summary ==="
          grep -E 'fetch-rules:|compile-rules:' rules-build.log || true

      - name: upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rule-bundle-audit
          path: |
            rules-out/sources.json
            rules-out/libyara.version
            rules-build.log
          retention-days: 90

  perf-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]

      - uses: docker/setup-buildx-action@8d2750c64d4f89012b439cd2de0e09c3ed2f4e32

      - name: build test image
        run: |
          docker buildx build --target test             --load -t yarad-test             -f docker/Dockerfile .

      - name: run benchmarks
        run: |
          docker run --rm yarad-test             go test -bench=. -benchmem -count=3 -timeout=10m             ./internal/yarad/ ./internal/extract/             | tee bench-results.txt

      - name: upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-results.txt
          retention-days: 90
