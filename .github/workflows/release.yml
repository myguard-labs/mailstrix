# Release. On a v* tag, build the yarad binary for amd64 + arm64 (CGO against the
# statically-linked libyara, exactly as the production image does) and attach
# both to a GitHub release. Binaries are dynamically linked against glibc/libssl/
# libz/libzstd; the static bit is libyara itself.
name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # One runner per arch so the slow arm64 QEMU build runs in parallel with
  # amd64 instead of after it (was a serial for-loop = sum of both).
  binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3   # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - name: build binaries (${{ matrix.arch }})
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          arch="${{ matrix.arch }}"
          docker buildx build \
            --target bin \
            --platform "linux/${arch}" \
            --build-arg "VERSION=${VERSION}" \
            --output "type=local,dest=dist/${arch}" \
            -f docker/Dockerfile .
          install -D "dist/${arch}/yarad" "out/yarad-linux-${arch}"
          # yarad-scan: the lean, CGO-free Sieve/LDA client.
          install -D "dist/${arch}/yarad-scan" "out/yarad-scan-linux-${arch}"
          ls -l out

      - name: upload arch binaries
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: out/
          retention-days: 1
          if-no-files-found: error

  release:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5   # gh release needs repo context

      - name: download arch binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: out/

      - name: checksums
        run: |
          set -euo pipefail
          ( cd out && sha256sum yarad-linux-* yarad-scan-linux-* > SHA256SUMS )
          ls -l out

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Idempotent: if a release for this tag already exists (e.g. created
          # manually before the tag push), upload/overwrite assets onto it
          # instead of failing the whole run on a duplicate.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" --clobber \
              out/yarad-linux-amd64 \
              out/yarad-linux-arm64 \
              out/yarad-scan-linux-amd64 \
              out/yarad-scan-linux-arm64 \
              out/SHA256SUMS
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              out/yarad-linux-amd64 \
              out/yarad-linux-arm64 \
              out/yarad-scan-linux-amd64 \
              out/yarad-scan-linux-arm64 \
              out/SHA256SUMS
          fi
