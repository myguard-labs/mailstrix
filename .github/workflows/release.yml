# Release. On a v* tag, build the strixd binary for amd64 + arm64 (CGO against the
# statically-linked libyara, exactly as the production image does) and attach
# both to a GitHub release. Binaries are dynamically linked against glibc/libssl/
# libz/libzstd; the static bit is libyara itself.
name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Re-run the full per-PR gate (docker build+test+smoke, lint, scanners) on the
  # tagged commit BEFORE publishing — a release must not ship code that wouldn't
  # pass CI. Reuses ci.yml via workflow_call so there's one source of truth.
  gate:
    permissions:
      contents: read
      actions: write   # ci.yml's docker job uses the buildx GHA cache
    uses: ./.github/workflows/ci.yml

  # One runner per arch so the slow arm64 QEMU build runs in parallel with
  # amd64 instead of after it (was a serial for-loop = sum of both).
  binaries:
    needs: gate
    runs-on: [self-hosted, builder02, docker]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3 arm64 emulation
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: build binaries (${{ matrix.arch }})
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          arch="${{ matrix.arch }}"
          docker buildx build \
            --target bin \
            --platform "linux/${arch}" \
            --build-arg "VERSION=${VERSION}" \
            --output "type=local,dest=dist/${arch}" \
            -f docker/Dockerfile .
          install -D "dist/${arch}/strixd" "out/strixd-linux-${arch}"
          # strix-scan: the lean, CGO-free Sieve/LDA client.
          install -D "dist/${arch}/strix-scan" "out/strix-scan-linux-${arch}"
          # strix-milter: the lean, CGO-free Postfix/Sendmail milter.
          install -D "dist/${arch}/strix-milter" "out/strix-milter-linux-${arch}"
          ls -l out

      - name: upload arch binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: bin-${{ matrix.arch }}
          path: out/
          retention-days: 1
          if-no-files-found: error

  # Build .deb packages (strixd daemon + strix-scan client + strix-milter, amd64
  # and arm64) from
  # the just-built binaries with nfpm — no debian/ tree, pure-Go packager.
  debs:
    needs: binaries
    runs-on: [self-hosted, builder02, lxc]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]

      - name: download arch binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: bin-*
          merge-multiple: true
          path: out/

      - name: install nfpm
        run: |
          set -euo pipefail
          NFPM_VERSION=2.43.0
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb" -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: build .deb packages
        run: |
          set -euo pipefail
          export VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p debout
          cd packaging/deb
          mkdir -p dist
          for arch in amd64 arm64; do
            # nfpm doesn't template the contents src path — stage to a fixed name.
            cp "../../out/strixd-linux-${arch}"      dist/strixd
            cp "../../out/strix-scan-linux-${arch}"   dist/strix-scan
            cp "../../out/strix-milter-linux-${arch}" dist/strix-milter
            export ARCH="$arch"
            nfpm pkg -f nfpm-strixd.yaml      -p deb -t "../../debout/strixd_${VERSION}_${arch}.deb"
            nfpm pkg -f nfpm-strix-scan.yaml -p deb -t "../../debout/strix-scan_${VERSION}_${arch}.deb"
            nfpm pkg -f nfpm-strix-milter.yaml -p deb -t "../../debout/strix-milter_${VERSION}_${arch}.deb"
          done
          ls -l ../../debout

      - name: upload .deb packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: debs
          path: debout/
          retention-days: 1
          if-no-files-found: error

  release:
    needs: [binaries, debs]
    runs-on: [self-hosted, builder02, lxc]
    permissions:
      contents: write   # create GitHub release + upload assets
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # zizmor: ignore[artipacked]

      - name: download arch binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: bin-*
          merge-multiple: true
          path: out/

      - name: download .deb packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: debs
          path: out/

      - name: checksums
        run: |
          set -euo pipefail
          ( cd out && sha256sum strixd-linux-* strix-scan-linux-* strix-milter-linux-* ./*.deb > SHA256SUMS )
          ls -l out

      # The self-hosted lxc runner image does not ship the gh CLI.
      - name: ensure gh CLI
        run: |
          command -v gh >/dev/null || {
            sudo apt-get update
            sudo apt-get install -y gh
          }

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Idempotent: if a release for this tag already exists (e.g. created
          # manually before the tag push), upload/overwrite assets onto it
          # instead of failing the whole run on a duplicate. Assets = the four
          # binaries, the four .debs, and the SHA256SUMS that covers them all.
          assets=( out/strixd-linux-* out/strix-scan-linux-* out/strix-milter-linux-* out/*.deb out/SHA256SUMS )
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" --clobber "${assets[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              "${assets[@]}"
          fi
